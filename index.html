const { useEffect, useRef } = React;

function Stars() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const resize = () => {
      const w = c.clientWidth, h = c.clientHeight;
      c.width = w * dpr; c.height = h * dpr;
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
      return { w, h };
    };
    let { w, h } = resize();
    const mkStars = () => Array.from({ length: Math.floor(w * h / 2400) }, () => ({
      x: Math.random() * w, y: Math.random() * h,
      r: 0.4 + Math.random() * 1.6, a: 0.2 + Math.random() * 0.8,
      s: 0.5 + Math.random() * 1.5, warm: Math.random() < 0.1,
      phase: Math.random() * Math.PI * 2,
    }));
    let stars = mkStars();
    const onResize = () => { ({ w, h } = resize()); stars = mkStars(); };
    window.addEventListener("resize", onResize);
    let raf, t0 = performance.now();
    const loop = (t) => {
      const dt = (t - t0) / 1000; ctx.clearRect(0, 0, w, h);
      stars.forEach(st => {
        const k = 0.55 + 0.45 * Math.sin(dt * st.s + st.phase);
        ctx.globalAlpha = st.a * k;
        ctx.fillStyle = st.warm ? "#FFD43B" : "#FFFFFF";
        ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2); ctx.fill();
      });
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", onResize); };
  }, []);
  return <canvas ref={ref} style={{ width: "100%", height: "100%", display: "block" }} />;
}
